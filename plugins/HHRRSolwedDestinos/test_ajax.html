<!DOCTYPE html>
<html>
<head>
    <title>Test AJAX - Employee Routes</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h1>Test AJAX - Employee Routes</h1>
    
    <h2>Test 1: Cargar Empleados</h2>
    <button onclick="testLoadEmployees()">Cargar Empleados</button>
    <div id="employees-result"></div>
    
    <h2>Test 2: Cargar Asignaciones</h2>
    <label>Route ID: <input type="number" id="route-id" value="1"></label>
    <button onclick="testLoadAssignments()">Cargar Asignaciones</button>
    <div id="assignments-result"></div>

    <script>
        function testLoadEmployees() {
            $('#employees-result').html('Cargando...');
            
            $.ajax({
                url: 'index.php?page=EditRuta',
                method: 'POST',
                dataType: 'json',
                data: {
                    action: 'get-employees'
                },
                success: function(data) {
                    $('#employees-result').html('<pre>' + JSON.stringify(data, null, 2) + '</pre>');
                },
                error: function(xhr, status, error) {
                    $('#employees-result').html('<div style="color: red;">Error: ' + error + '<br>Response: ' + xhr.responseText + '</div>');
                }
            });
        }
        
        function testLoadAssignments() {
            const routeId = $('#route-id').val();
            $('#assignments-result').html('Cargando...');
            
            $.ajax({
                url: 'index.php?page=EditRuta',
                method: 'POST',
                dataType: 'json',
                data: {
                    action: 'load-rutas-data',
                    idruta: routeId
                },
                success: function(data) {
                    $('#assignments-result').html('<pre>' + JSON.stringify(data, null, 2) + '</pre>');
                },
                error: function(xhr, status, error) {
                    $('#assignments-result').html('<div style="color: red;">Error: ' + error + '<br>Response: ' + xhr.responseText + '</div>');
                }
            });
        }
    </script>
</body>
</html>
